<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobs Agent</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/alpinejs@3.14.8" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
    {% block extrahead %}{% endblock %}
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <a href="/" class="nav-brand">✦ Jobs Agent</a>
            <div class="nav-links">
                <a href="/" class="nav-link{% if request.url.path == '/' %} active{% endif %}">Jobs</a>
                <a href="/logs" class="nav-link{% if request.url.path == '/logs' %} active{% endif %}">Logs</a>
                <a href="/chat" class="nav-link{% if request.url.path == '/chat' %} active{% endif %}">Chat</a>
                <a href="/settings" class="nav-link{% if request.url.path == '/settings' %} active{% endif %}">Settings</a>
            </div>
        </div>
    </nav>
    <main class="main">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
